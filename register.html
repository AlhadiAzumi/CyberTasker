<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun — Cyber-Tasker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230f172a'/%3E%3Crect x='6' y='6' width='52' height='52' rx='10' fill='none' stroke='%2300f2fe' stroke-width='2' opacity='0.4'/%3E%3Crect x='18' y='20' width='28' height='4' rx='2' fill='%2300f2fe'/%3E%3Crect x='18' y='30' width='20' height='4' rx='2' fill='%234facfe' opacity='0.8'/%3E%3Crect x='18' y='40' width='24' height='4' rx='2' fill='%234facfe' opacity='0.5'/%3E%3Ccircle cx='48' cy='44' r='10' fill='%230f172a'/%3E%3Ccircle cx='48' cy='44' r='9' fill='%2300f2fe'/%3E%3Ctext x='48' y='49' text-anchor='middle' font-size='13' font-weight='700' font-family='Arial' fill='%230f172a'%3E%E2%9C%93%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --primary: #ff007f;
            --secondary: #7928ca;
            --bg-dark: #0a0c16;
            --card-bg: rgba(18, 13, 36, 0.65);
            --text-light: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background: radial-gradient(circle at center, #25163c 0%, var(--bg-dark) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            color: var(--text-light);
        }

        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            filter: blur(100px);
            opacity: 0.15;
            z-index: 0;
        }
        body::before { top: -50px; right: -50px; }
        body::after  { bottom: -50px; left: -50px; }

        .register-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            width: 100%; max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 15px rgba(255,0,127,0.05);
            border: 1px solid rgba(255,0,127,0.2);
            z-index: 1;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .register-container:hover {
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 25px rgba(255,0,127,0.15);
        }

        /* Brand / Logo */
        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 28px;
        }
        .brand-icon { width: 40px; height: 40px; flex-shrink: 0; }
        h2 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            font-weight: 700;
            line-height: 1;
        }

        .input-group { margin-bottom: 20px; text-align: left; }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            outline: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input::placeholder { color: #64748b; }
        input[type="text"]:focus, input[type="password"]:focus {
            background: rgba(255,255,255,0.08);
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255,0,127,0.3);
        }
        input.is-invalid {
            border-color: #ff4d4d !important;
            box-shadow: 0 0 12px rgba(255,77,77,0.25) !important;
            background: rgba(255,77,77,0.03) !important;
        }
        input.is-valid {
            border-color: #00ff88 !important;
            box-shadow: 0 0 12px rgba(0,255,136,0.25) !important;
            background: rgba(0,255,136,0.03) !important;
        }

        .validation-note {
            font-size: 0.75rem; color: #ff4d4d;
            margin-top: 4px; display: none; opacity: 0;
            transform: translateY(-5px);
            transition: all 0.3s ease;
            text-align: left; padding-left: 4px;
        }
        .validation-note.show { display: block; opacity: 1; transform: translateY(0); }

        .checkbox-container {
            display: flex; align-items: center; gap: 8px;
            margin: 15px 0 25px 0; cursor: pointer;
            font-size: 0.9rem; color: #a0aec0; user-select: none;
        }
        .checkbox-container input { cursor: pointer; accent-color: var(--primary); }

        button {
            width: 100%; padding: 14px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none; outline: none; border-radius: 10px;
            color: #fff; font-size: 1rem; font-weight: bold;
            letter-spacing: 1px; cursor: pointer; text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(255,0,127,0.3);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,0,127,0.5); filter: brightness(1.1); }
        button:active { transform: translateY(1px); }

        #message {
            margin-top: 15px; min-height: 24px;
            font-size: 0.95rem; font-weight: 500;
            opacity: 0; transform: scale(0.95);
            transition: all 0.3s ease;
        }
        #message.show { opacity: 1; transform: scale(1); }

        p { margin-top: 25px; font-size: 0.9rem; color: #a0aec0; }
        a { color: var(--primary); text-decoration: none; font-weight: 600; transition: all 0.3s ease; }
        a:hover { color: #fff; text-shadow: 0 0 8px var(--primary); }
    </style>
</head>
<body>

<div class="register-container">

    <!-- Brand / Logo -->
    <div class="brand">
        <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
            <rect width="64" height="64" rx="14" fill="#0f172a"/>
            <rect x="6" y="6" width="52" height="52" rx="10" fill="none" stroke="#00f2fe" stroke-width="2" opacity="0.4"/>
            <rect x="18" y="20" width="28" height="4" rx="2" fill="#00f2fe"/>
            <rect x="18" y="30" width="20" height="4" rx="2" fill="#4facfe" opacity="0.8"/>
            <rect x="18" y="40" width="24" height="4" rx="2" fill="#4facfe" opacity="0.5"/>
            <circle cx="48" cy="44" r="10" fill="#0f172a"/>
            <circle cx="48" cy="44" r="9" fill="#00f2fe"/>
            <text x="48" y="49" text-anchor="middle" font-size="13" font-weight="700" font-family="Arial" fill="#0f172a">✓</text>
        </svg>
        <h2>Daftar Akun</h2>
    </div>

    <div class="input-group">
        <input type="text" id="regUsername" placeholder="Email" oninput="validateEmailLive()" required>
        <span id="emailNote" class="validation-note">Format email harus benar (contoh: nama@email.com)</span>
    </div>

    <div class="input-group">
        <input type="password" id="regPassword" placeholder="Password" required>
    </div>

    <div class="input-group">
        <input type="password" id="confirmPassword" placeholder="Konfirmasi Password" required>
    </div>

    <label class="checkbox-container">
        <input type="checkbox" id="showPasswordToggle" onclick="togglePassword()">
        <span>Tampilkan Password</span>
    </label>

    <button onclick="register()">Sign Up</button>
    <p id="message"></p>
    <p>Sudah punya akun? <a href="index.html">Login di sini</a></p>
</div>

<script>
    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function togglePassword() {
        const type = document.getElementById('showPasswordToggle').checked ? 'text' : 'password';
        document.getElementById('regPassword').type = type;
        document.getElementById('confirmPassword').type = type;
    }

    function validateEmailLive() {
        const emailInput = document.getElementById('regUsername');
        const emailNote  = document.getElementById('emailNote');
        const val        = emailInput.value.trim();
        const regex      = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (val === "") {
            emailInput.classList.remove('is-valid', 'is-invalid');
            emailNote.classList.remove('show');
            return false;
        }
        if (regex.test(val)) {
            emailInput.classList.replace('is-invalid', 'is-valid') || emailInput.classList.add('is-valid');
            emailNote.classList.remove('show');
            return true;
        } else {
            emailInput.classList.replace('is-valid', 'is-invalid') || emailInput.classList.add('is-invalid');
            emailNote.classList.add('show');
            return false;
        }
    }

    function displayMessage(text, color) {
        const msg = document.getElementById('message');
        msg.classList.remove('show');
        setTimeout(() => {
            msg.textContent = text;
            msg.style.color = color;
            msg.classList.add('show');
        }, 50);
    }

    async function register() {
        const username        = document.getElementById('regUsername').value.trim();
        const password        = document.getElementById('regPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!username || !password || !confirmPassword) {
            displayMessage("Semua kolom harus diisi!", "#ff4d4d"); return;
        }
        if (!validateEmailLive()) {
            displayMessage("Format email salah atau tidak valid!", "#ff4d4d"); return;
        }
        if (password.length < 8) {
            displayMessage("Password minimal harus 8 karakter!", "#ff4d4d"); return;
        }
        if (!/[a-zA-Z]/.test(password) || !/[0-9]/.test(password)) {
            displayMessage("Password harus kombinasi huruf dan angka!", "#ff4d4d"); return;
        }
        if (password !== confirmPassword) {
            displayMessage("Konfirmasi password tidak cocok!", "#ff4d4d"); return;
        }

        const users = JSON.parse(localStorage.getItem('users')) || {};
        if (users[username]) {
            displayMessage("Email sudah terdaftar. Silakan gunakan email lain.", "#ff4d4d"); return;
        }

        const hashedPassword = await hashPassword(password);
        users[username] = hashedPassword;
        localStorage.setItem('users', JSON.stringify(users));

        displayMessage("Pendaftaran berhasil! Mengalihkan...", "#00ff88");

        document.getElementById('regUsername').value = "";
        document.getElementById('regPassword').value = "";
        document.getElementById('confirmPassword').value = "";
        document.getElementById('showPasswordToggle').checked = false;
        document.getElementById('regUsername').classList.remove('is-valid', 'is-invalid');

        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
    }
</script>
</body>
</html>
